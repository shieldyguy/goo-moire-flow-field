<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="https://use.typekit.net/ubs4dtx.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 630px;
      background: #f0d860;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: "anchor", system-ui, sans-serif;
      overflow: hidden;
      position: relative;
    }

    .bg-circles {
      position: absolute;
      inset: 0;
      overflow: hidden;
      opacity: 0.12;
    }
    .bg-circles .circle {
      position: absolute;
      border-radius: 50%;
      border: 3px solid #6b4530;
    }
    .bg-circles .c1 { width: 400px; height: 400px; top: -80px; left: -60px; }
    .bg-circles .c2 { width: 300px; height: 300px; top: 200px; right: -40px; }
    .bg-circles .c3 { width: 500px; height: 500px; bottom: -200px; left: 300px; }
    .bg-circles .c4 { width: 200px; height: 200px; top: 60px; right: 300px; }
    .bg-circles .c5 { width: 350px; height: 350px; bottom: -100px; left: -80px; }

    .content {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 0 80px;
    }

    h1 {
      font-family: "blow-up", "anchor", system-ui, sans-serif;
      font-size: 80px;
      line-height: 1;
      color: #6b4530;
      margin-bottom: 24px;
      letter-spacing: -1px;
    }

    .url {
      font-size: 22px;
      color: #6b4530;
      opacity: 0.6;
      position: absolute;
      bottom: 36px;
      left: 0;
      right: 0;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="bg-circles">
    <div class="circle c1"></div>
    <div class="circle c2"></div>
    <div class="circle c3"></div>
    <div class="circle c4"></div>
    <div class="circle c5"></div>
  </div>
  <div class="content">
    <h1>Emergent Field Explorer</h1>
  </div>
  <div class="url">fields.lunchfirm.com</div>
</body>
</html>
